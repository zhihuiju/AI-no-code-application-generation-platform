spring:
  application:
    name: tao-ai-code-mother
  # session 配置
  session:
    # session 30 天过期 （后端）
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tao_ai_code_mother
    username: root
    password: 12345678
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期  （前端）
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.tao.taoaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn